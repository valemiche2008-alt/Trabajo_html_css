<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexbox y Grid Demo</title>
<link rel="stylesheet" href="jdsti.css">
</head>
<body><h1>Flexbox y CSS Grid</h1>

    <h2>Flex Direction</h2>
    <div class="contenedor flex row">
    <div class="box">1</div>
  <div class="box">2</div>
  <div class="box">3</div>
</div>

<div class="contenedor flex column">
  <div class="box">1</div>
  <div class="box">2</div>
  <div class="box">3</div>
  </div>
  
  <div class="contenedor flex column-reverse">
  <div class="box">1</div>
  <div class="box">2</div>
  <div class="box">3</div>
</div>

<div class="contenedor flex row-reverse">
  <div class="box">1</div>
  <div class="box">2</div>
  <div class="box">3</div>
</div>

<h2>Flex Wrap</h2>
<div class="contenedor flex wrap">
  <div class="box">1</div>
  <div class="box">2</div>
  <div class="box">3</div>
  <div class="box">4</div>
  <div class="box">5</div>
</div>

<h2>Justify Content</h2>
<div class="contenedor flex center">
  <div class="box">1</div>
  <div class="box">2</div>
</div>

<div class="contenedor flex space-between">
  <div class="box">1</div>
  <div class="box">2</div>
</div>

<div class="contenedor flex space-around">
  <div class="box">1</div>
  <div class="box">2</div>
</div>

<h2>Align Items</h2>
<div class="contenedoR flex align-center">
  <div class="box">1</div>
  <div class="box">2</div>
</div>

<h2>Gap</h2>
<div class="contenedoR flex gap">
  <div class="box">1</div>
  <div class="box">2</div>
  <div class="box">3</div>
</div>

<h2>CSS Grid Básico</h2>
<div class="contenedor grid">
  <div class="box">1</div>
  <div class="box">2</div>
  <div class="box">3</div>
  <div class="box">4</div>
  <div class="box">5</div>
  <div class="box">6</div>
</div>

<h2>Grid Areas</h2>
<div class="contenedor grid-areas">
  <div class="header">Header</div>
  <div class="sidebar">Sidebar</div>
  <div class="content">Content</div>
  <div class="footer">Footer</div>
</div>
</body>
</html>
